<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigma Animation — Variable 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FAF8F5;
      font-family: -apple-system, sans-serif;
    }
    #lottie { width: 656px; height: 255px; max-width: 95vw; }
    #controls { margin-top: 20px; display: flex; align-items: center; gap: 12px; }

    /* Play/Pause button */
    #btn-playpause {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid #1a1a1a; background: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    #btn-playpause:hover { background: rgba(0,0,0,0.06); }
    #btn-playpause svg { width: 14px; height: 14px; }

    /* Scrubber */
    #scrubber {
      width: 300px; max-width: 55vw;
      -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px;
      background: #ddd; outline: none; cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #1a1a1a; cursor: pointer; transition: transform 0.1s;
    }
    #scrubber::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* Frame counter */
    #frame-counter { font-size: 11px; color: #999; letter-spacing: 0.04em; min-width: 52px; text-align: right; }

    /* Replay */
    #btn-replay {
      font-size: 11px; color: #999;
      border: 1px solid #ddd; background: none;
      border-radius: 4px; padding: 4px 10px; cursor: pointer;
      letter-spacing: 0.05em; transition: color 0.15s, border-color 0.15s;
    }
    #btn-replay:hover { color: #EA5518; border-color: #EA5518; }
  </style>
</head>

      <svg id="icon-play"  viewBox="0 0 14 14" fill="#1a1a1a" style="display:none"><polygon points="2,1 13,7 2,13"/></svg>
    </button>
    <input type="range" id="scrubber" min="0" max="360" value="0" step="1">
    <span id="frame-counter">f 0 / 360</span>
    <button id="btn-replay">↺ restart</button>

const anim = lottie.loadAnimation({
  container: document.getElementById('lottie'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  animationData: animData
});

const TOTAL_FRAMES = 360;
const scrubber     = document.getElementById('scrubber');
const frameCounter = document.getElementById('frame-counter');
const btnPlay      = document.getElementById('btn-playpause');
const iconPause    = document.getElementById('icon-pause');
const iconPlay     = document.getElementById('icon-play');
const btnReplay    = document.getElementById('btn-replay');
let isPlaying = true, scrubbing = false;

function setPlayState(playing) {
  isPlaying = playing;
  iconPause.style.display = playing ? '' : 'none';
  iconPlay.style.display  = playing ? 'none' : '';
}

anim.addEventListener('enterFrame', () => {
  if (scrubbing) return;
  const f = Math.round(anim.currentFrame);
  scrubber.value = f;
  frameCounter.textContent = `f ${f} / ${TOTAL_FRAMES}`;
});

btnPlay.addEventListener('click', () => {
  if (isPlaying) { anim.pause(); setPlayState(false); }
  else           { anim.play();  setPlayState(true);  }
});

scrubber.addEventListener('mousedown', () => { scrubbing = true; anim.pause(); setPlayState(false); });
scrubber.addEventListener('input', () => {
  const f = parseInt(scrubber.value);
  anim.goToAndStop(f, true);
  frameCounter.textContent = `f ${f} / ${TOTAL_FRAMES}`;
});
scrubber.addEventListener('mouseup', () => { scrubbing = false; });

btnReplay.addEventListener('click', () => { anim.goToAndPlay(0, true); setPlayState(true); });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); btnPlay.click(); }
});
  </script>
