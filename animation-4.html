<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANTE — Animation IV</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080808;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'IBM Plex Mono', monospace;
}
#stage {
  position: relative;
  width: 640px; height: 400px;
  border: 1px solid #1a0e06;
  border-radius: 2px;
  overflow: hidden;
  /* CRT bezel inner shadow */
  box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(253,75,8,0.08);
}
#anim-canvas { display: block; width: 640px; height: 400px; }

/* Controls */
#controls {
  display: flex; align-items: center; gap: 12px;
  margin-top: 10px; width: 640px;
  background: #0a0806; border: 1px solid #1a1208;
  border-radius: 4px; padding: 12px 16px;
}
button.ctrl {
  background: none; border: 1px solid #251a0e;
  color: #FD4B08; border-radius: 3px;
  width: 30px; height: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color 0.15s;
}
button.ctrl:hover { border-color: #FD4B08; }
#scrubber {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 2px; background: #251a0e; border-radius: 1px;
  outline: none; cursor: pointer;
}
#scrubber::-webkit-slider-thumb {
  -webkit-appearance: none; width: 8px; height: 8px;
  border-radius: 1px; background: #FD4B08; cursor: pointer;
}
#frame-counter {
  font-size: 10px; color: #3a2a18; letter-spacing: 0.05em;
  white-space: nowrap; width: 88px; text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}
#export-btn {
  background: none; border: 1px solid #251a0e; color: #FD4B08;
  border-radius: 3px; height: 30px; padding: 0 10px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  letter-spacing: 0.06em; white-space: nowrap; transition: border-color 0.15s;
}
#export-btn:hover:not(:disabled) { border-color: #FD4B08; }
#export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#export-btn.recording { border-color: #FF0055; color: #FF0055; }
#export-progress { display: none; width: 60px; height: 2px; background: #251a0e; border-radius: 1px; overflow: hidden; flex-shrink: 0; }
#export-progress-bar { height: 100%; background: #FD4B08; width: 0%; transition: width 0.1s linear; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="anim-canvas" width="640" height="400"></canvas>
</div>

<div id="controls">
  <button class="ctrl" id="restart-btn">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 1.5V0L4 2.5 6.5 5V3a3.5 3.5 0 110 7 3.5 3.5 0 01-3.5-3.5H1A5.5 5.5 0 106.5 1.5z" fill="#FD4B08"/>
    </svg>
  </button>
  <button class="ctrl" id="play-btn">
    <svg id="play-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M2.5 1.5l9 5-9 5V1.5z" fill="#FD4B08"/>
    </svg>
    <svg id="pause-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:none">
      <rect x="1.5" y="1.5" width="3.5" height="10" fill="#FD4B08"/>
      <rect x="8" y="1.5" width="3.5" height="10" fill="#FD4B08"/>
    </svg>
  </button>
  <input type="range" id="scrubber" min="0" max="239" value="0" step="1">
  <span id="frame-counter">f 0 / 239</span>
  <div id="export-progress"><div id="export-progress-bar"></div></div>
  <button id="export-btn">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path d="M5.5 0v7M2.5 4.5l3 3 3-3M0 9.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    EXPORT
  </button>
</div>

<script>
// ─── Constants ─────────────────────────────────────────────────────────────
const FPS          = 60;
const TOTAL_FRAMES = 240;  // 4 s
const PIXEL_SCALE  = 2;    // pixelation: render at 1/2, draw at 2x
const OR = 253, OG = 75, OB = 8;
const W = 640, H = 400;
const CX = W / 2, CY = H / 2;
// Small canvas dimensions
const SW = W / PIXEL_SCALE, SH = H / PIXEL_SCALE;  // 320 × 200

// ─── Canvases ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('anim-canvas');
const ctx    = canvas.getContext('2d');

const small  = document.createElement('canvas');
small.width  = SW; small.height = SH;
const sCtx   = small.getContext('2d');
sCtx.imageSmoothingEnabled = false;

// ─── Bot SVG ───────────────────────────────────────────────────────────────
const svgSrc = `<svg width="323" height="195" viewBox="0 0 323 195" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#c)">
<path d="M65.5 5.75977H86.5V26.9598H65.5C65.5 26.9598 65.93 6.16977 65.5 5.75977Z" fill="#FD4B08"/>
<path d="M293.06 67.26V84.26H274.25V50.61H256.16V34.33H236.26V49.89H219.98V33.97H198.63V15.89H180.9V0H142.55V15.89H123.74V33.62H104.2V49.18H86.47V33.62H65.85V49.18H48.48V84.27H28.94V66.18H0C0 65.09 0 100.19 0 100.19H28.22V132.39H47.4V164.23H65.85V179.43H85.03V194.79H123.38V180.52H197.91V194.79H237.71V181.24H256.16V165.32H273.89V131.67H293.43V101.28H322.37V67.27H293.06V67.26ZM123.5 131.33H94.56C94.56 131.33 95.16 98.05 94.56 97.39H123.5V131.33ZM228.07 131.33H199.13C199.13 131.33 199.73 98.05 199.13 97.39H228.07V131.33Z" fill="#FD4B08"/>
<path d="M235.58 5.75977H256.58V26.9598H235.58C235.58 26.9598 236.01 6.16977 235.58 5.75977Z" fill="#FD4B08"/>
</g>
<defs><clipPath id="c"><rect width="322.37" height="194.78" fill="white"/></clipPath></defs>
</svg>`;

const botImg = new Image();
let   botLoaded = false;
botImg.onload = () => { botLoaded = true; };
botImg.src = URL.createObjectURL(new Blob([svgSrc], { type: 'image/svg+xml' }));

// Pre-rendered tinted canvases for RGB separation (at SMALL scale)
let tintRed, tintCyan;
function prerenderTints() {
  function tint(color) {
    const c  = document.createElement('canvas');
    c.width  = SW; c.height = SH;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    cx.drawImage(small, 0, 0);
    cx.globalCompositeOperation = 'source-in';
    cx.fillStyle = color;
    cx.fillRect(0, 0, SW, SH);
    return c;
  }
  tintRed  = tint('#FF1500');
  tintCyan = tint('#00FFEA');
}

// ─── Bot layout ────────────────────────────────────────────────────────────
const SC  = 0.86;
const BW  = 323 * SC, BH = 195 * SC;
const BX  = CX - BW/2, BY = CY - BH/2;
// In small canvas coords:
const sBW = BW / PIXEL_SCALE, sBH = BH / PIXEL_SCALE;
const sBX = SW/2 - sBW/2,    sBY = SH/2 - sBH/2;

// Eye positions in MAIN canvas (for reference)
const eyes = [
  { cx: BX + 109.03*SC, cy: BY + 114.36*SC, w: 28.94*SC, h: 33.94*SC },
  { cx: BX + 213.60*SC, cy: BY + 114.36*SC, w: 28.94*SC, h: 33.94*SC },
];
// Convert to small canvas coords
const sEyes = eyes.map(e => ({
  cx: e.cx / PIXEL_SCALE, cy: e.cy / PIXEL_SCALE,
  w:  e.w  / PIXEL_SCALE, h:  e.h  / PIXEL_SCALE,
}));

// ─── Pre-build CRT scanline pattern ────────────────────────────────────────
const slPat2 = document.createElement('canvas');
slPat2.width = 1; slPat2.height = 2;
const sl2 = slPat2.getContext('2d');
sl2.fillStyle = 'rgba(0,0,0,0.28)';
sl2.fillRect(0, 0, 1, 1);
let scanPattern;
// Pixel grid pattern (dark lines between 2×2 blocks)
const pgPat = document.createElement('canvas');
pgPat.width = 2; pgPat.height = 2;
const pg = pgPat.getContext('2d');
pg.fillStyle = 'rgba(0,0,0,0.12)';
pg.fillRect(0, 0, 1, 2); // left column of each 2×2 block
let pixelGridPattern;

// ─── Animation helpers ─────────────────────────────────────────────────────
function getBob(frame) {
  const t = frame / TOTAL_FRAMES;
  return Math.sin(t * Math.PI * 2 * 1.5) * 5;      // ±5px in main coords
}

function getBlink(frame) {
  // Blink every 110 frames, takes 10 frames close+open
  const cycle = frame % 110;
  if (cycle < 5)  return cycle / 5;          // closing 0→1
  if (cycle < 10) return 1 - (cycle-5) / 5;  // opening 1→0
  return 0;
}

// Subtle screen flicker
function getFlicker(frame) {
  const f = frame | 0;
  const x = Math.sin(f * 127.1 + 311.7) * 43758.5453;
  const r = x - Math.floor(x);
  // Very rare brief dim flicker
  const cycle = frame % 173;
  if (cycle > 170) return 0.93 + (cycle-170)/3 * 0.07;
  if (cycle < 3)   return 0.93 + cycle/3 * 0.07;
  return 1.0;
}

// Beam scan — a slowly moving bright horizontal band
function getBeamY(frame) {
  return ((frame / TOTAL_FRAMES) * H * 2.5) % (H + 80) - 40;
}

// ─── Main render ───────────────────────────────────────────────────────────
function renderFrame(frame) {
  if (!botLoaded) return;

  const t         = frame / TOTAL_FRAMES;
  const bobMain   = getBob(frame);
  const bobSmall  = bobMain / PIXEL_SCALE;
  const blinkAmt  = getBlink(frame);
  const flicker   = getFlicker(frame);

  // ── 1. Draw bot to small canvas ───────────────────────────────────────
  sCtx.clearRect(0, 0, SW, SH);
  const drawY = sBY + bobSmall;
  sCtx.drawImage(botImg, sBX, drawY, sBW, sBH);

  // Blink: cover eyes with orange
  if (blinkAmt > 0) {
    sCtx.fillStyle = `rgb(${OR},${OG},${OB})`;
    sEyes.forEach(e => {
      const ey = e.cy - e.h/2 + bobSmall;
      const lh = e.h * blinkAmt;
      sCtx.fillRect(e.cx - e.w/2, ey,        e.w, lh);       // top eyelid
      sCtx.fillRect(e.cx - e.w/2, ey+e.h-lh, e.w, lh);       // bottom eyelid
    });
  }

  // ── 2. Main canvas background ─────────────────────────────────────────
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  // Ambient phosphor glow behind bot
  const ambR = 160 + 15 * Math.sin(t * Math.PI * 2);
  const amb  = ctx.createRadialGradient(CX, CY + bobMain, 0, CX, CY + bobMain, ambR);
  amb.addColorStop(0,   `rgba(${OR},${OG},${OB},0.13)`);
  amb.addColorStop(0.5, `rgba(180,50,0,0.05)`);
  amb.addColorStop(1,    'transparent');
  ctx.fillStyle = amb;
  ctx.fillRect(0, 0, W, H);

  // ── 3. Draw pixelated bot to main canvas (with phosphor bloom) ────────
  ctx.imageSmoothingEnabled = false;

  // Bloom pass (draw faint + blurred for phosphor emission)
  ctx.save();
  ctx.globalAlpha = 0.55 * flicker;
  ctx.shadowColor = `rgba(${OR},${OG},${OB},0.9)`;
  ctx.shadowBlur  = 14;
  ctx.drawImage(small, 0, 0, W, H);
  ctx.restore();

  // Crisp bot pass
  ctx.save();
  ctx.globalAlpha = flicker;
  ctx.drawImage(small, 0, 0, W, H);
  ctx.restore();

  // ── 4. RGB chromatic separation ───────────────────────────────────────
  const aberr = 3; // pixels in main coords (= 1.5 small pixels)
  prerenderTints(); // re-tint from current small canvas
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.40 * flicker;
  ctx.imageSmoothingEnabled = false;
  // Red channel: shifted right → draw at +aberr
  ctx.drawImage(tintRed,  aberr, 0, W, H);
  // Cyan channel: shifted left → draw at -aberr
  ctx.drawImage(tintCyan, -aberr, 0, W, H);
  ctx.restore();

  ctx.imageSmoothingEnabled = true;

  // ── 5. Pixel grid overlay (between 2×2 blocks) ────────────────────────
  if (!pixelGridPattern) pixelGridPattern = ctx.createPattern(pgPat, 'repeat');
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = pixelGridPattern;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ── 6. CRT scanlines ──────────────────────────────────────────────────
  if (!scanPattern) scanPattern = ctx.createPattern(slPat2, 'repeat');
  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = scanPattern;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ── 7. Beam scan (slow bright band moving down the screen) ────────────
  const beamY = getBeamY(frame);
  const beam  = ctx.createLinearGradient(0, beamY - 20, 0, beamY + 20);
  beam.addColorStop(0,   'transparent');
  beam.addColorStop(0.5, 'rgba(255,255,255,0.022)');
  beam.addColorStop(1,   'transparent');
  ctx.fillStyle = beam;
  ctx.fillRect(0, 0, W, H);

  // ── 8. Arcade HUD: "ANTE" label (Press Start 2P, tiny) ───────────────
  ctx.save();
  ctx.font         = '7px "Press Start 2P", monospace';
  ctx.fillStyle    = `rgba(${OR},${OG},${OB},0.45)`;
  ctx.shadowColor  = `rgba(${OR},${OG},${OB},0.6)`;
  ctx.shadowBlur   = 8;
  ctx.fillText('ANTE BOT', 20, H - 22);
  ctx.font         = '6px "Press Start 2P", monospace';
  ctx.fillStyle    = `rgba(${OR},${OG},${OB},0.25)`;
  ctx.shadowBlur   = 4;
  ctx.fillText('© ANTIGMA', W - 94, H - 22);
  ctx.restore();

  // ── 9. Screen edge vignette ───────────────────────────────────────────
  const vig = ctx.createRadialGradient(CX, CY, W*0.30, CX, CY, W*0.75);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ─── Playback ──────────────────────────────────────────────────────────────
const scrubber     = document.getElementById('scrubber');
const frameCounter = document.getElementById('frame-counter');
const playBtn      = document.getElementById('play-btn');
const playIcon     = document.getElementById('play-icon');
const pauseIcon    = document.getElementById('pause-icon');
const restartBtn   = document.getElementById('restart-btn');

let currentFrame = 0, playing = true, scrubbing = false, lastTS = null;

function setPlaying(v) {
  playing = v; lastTS = null;
  playIcon.style.display  = v ? 'none'  : 'block';
  pauseIcon.style.display = v ? 'block' : 'none';
}
playBtn.addEventListener('click',   () => setPlaying(!playing));
restartBtn.addEventListener('click', () => { currentFrame = 0; if (!playing) { renderFrame(0); updateUI(0); } });
scrubber.addEventListener('mousedown', () => { scrubbing = true; });
scrubber.addEventListener('input',     () => { currentFrame = parseInt(scrubber.value); renderFrame(currentFrame); updateUI(currentFrame); });
scrubber.addEventListener('mouseup',   () => { scrubbing = false; lastTS = null; });
document.addEventListener('keydown',   e  => { if (e.code === 'Space') { e.preventDefault(); setPlaying(!playing); } });
function updateUI(f) { scrubber.value = f; frameCounter.textContent = `f ${f} / ${TOTAL_FRAMES-1}`; }

function loop(ts) {
  if (!scrubbing && playing) {
    if (lastTS !== null) currentFrame = (currentFrame + (ts - lastTS) / 1000 * FPS) % TOTAL_FRAMES;
    lastTS = ts;
  }
  const f = Math.round(currentFrame) % TOTAL_FRAMES;
  renderFrame(f); updateUI(f);
  requestAnimationFrame(loop);
}

(function waitForBot() {
  if (!botLoaded) { setTimeout(waitForBot, 30); return; }
  setPlaying(true);
  requestAnimationFrame(loop);
})();

// ─── Export ────────────────────────────────────────────────────────────────
const exportBtn      = document.getElementById('export-btn');
const exportProgress = document.getElementById('export-progress');
const exportBar      = document.getElementById('export-progress-bar');

exportBtn.addEventListener('click', () => {
  if (exportBtn.disabled) return;
  setPlaying(false);
  exportBtn.disabled = true;
  exportBtn.classList.add('recording');
  exportBtn.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#FF0055"/></svg> REC...`;
  exportProgress.style.display = 'block';
  exportBar.style.width = '0%';

  const stream   = canvas.captureStream(60);
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks   = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mimeType });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'ante-bot-8bit.webm';
    a.click();
    exportBtn.disabled = false;
    exportBtn.classList.remove('recording');
    exportBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 0v7M2.5 4.5l3 3 3-3M0 9.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> EXPORT`;
    exportProgress.style.display = 'none';
    exportBar.style.width = '0%';
    setPlaying(true);
  };
  recorder.start();
  let recFrame = 0;
  function renderNext() {
    if (recFrame >= TOTAL_FRAMES) { recorder.stop(); return; }
    renderFrame(recFrame); updateUI(recFrame);
    exportBar.style.width = `${(recFrame / TOTAL_FRAMES) * 100}%`;
    recFrame++;
    setTimeout(renderNext, 1000 / FPS);
  }
  renderNext();
});
</script>
</body>
</html>
