<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANTE — Animation IV</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060402;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'IBM Plex Mono', monospace;
}
#stage {
  position: relative;
  width: 640px; height: 400px;
  border: 1px solid #1a1006;
  border-radius: 2px;
  overflow: hidden;
}
#anim-canvas { display: block; width: 640px; height: 400px; }

/* Controls */
#controls {
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; width: 640px;
  background: #0b0804; border: 1px solid #1a1208;
  border-radius: 4px; padding: 12px 16px;
}
button.ctrl {
  background: none; border: 1px solid #2a1e10;
  color: #FD4B08; border-radius: 3px;
  width: 30px; height: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color 0.15s;
}
button.ctrl:hover { border-color: #FD4B08; }
#scrubber {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 2px; background: #2a1e10; border-radius: 1px;
  outline: none; cursor: pointer;
}
#scrubber::-webkit-slider-thumb {
  -webkit-appearance: none; width: 8px; height: 8px;
  border-radius: 1px; background: #FD4B08; cursor: pointer;
}
#frame-counter {
  font-size: 10px; color: #3a2a18; letter-spacing: 0.05em;
  white-space: nowrap; width: 88px; text-align: right;
}
#export-btn {
  background: none; border: 1px solid #2a1e10;
  color: #FF9A3C; border-radius: 3px; height: 30px;
  padding: 0 10px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.06em; white-space: nowrap;
  transition: border-color 0.15s;
}
#export-btn:hover:not(:disabled) { border-color: #FF9A3C; }
#export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#export-btn.recording { border-color: #FF0055; color: #FF0055; }
#export-progress { display: none; width: 60px; height: 2px; background: #2a1e10; border-radius: 1px; overflow: hidden; flex-shrink: 0; }
#export-progress-bar { height: 100%; background: #FF9A3C; width: 0%; transition: width 0.1s linear; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="anim-canvas" width="640" height="400"></canvas>
</div>

<div id="controls">
  <button class="ctrl" id="restart-btn" title="Restart">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 1.5V0L4 2.5 6.5 5V3a3.5 3.5 0 110 7 3.5 3.5 0 01-3.5-3.5H1A5.5 5.5 0 106.5 1.5z" fill="#FD4B08"/>
    </svg>
  </button>
  <button class="ctrl" id="play-btn" title="Play / Pause (Space)">
    <svg id="play-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M2.5 1.5l9 5-9 5V1.5z" fill="#FD4B08"/>
    </svg>
    <svg id="pause-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:none">
      <rect x="1.5" y="1.5" width="3.5" height="10" fill="#FD4B08"/>
      <rect x="8" y="1.5" width="3.5" height="10" fill="#FD4B08"/>
    </svg>
  </button>
  <input type="range" id="scrubber" min="0" max="239" value="0" step="1">
  <span id="frame-counter">f 0 / 239</span>
  <div id="export-progress"><div id="export-progress-bar"></div></div>
  <button id="export-btn" title="Export one loop as WebM video">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path d="M5.5 0v7M2.5 4.5l3 3 3-3M0 9.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    EXPORT
  </button>
</div>

<script>
// ─── Constants ─────────────────────────────────────────────────────────────
const FPS          = 60;
const TOTAL_FRAMES = 240;  // 4 s
const OR = 253, OG = 75, OB = 8;   // #FD4B08 orange
const W = 640, H = 400, CX = W/2, CY = H/2 + 8; // bot sits slightly below center

// ─── Canvas ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('anim-canvas');
const ctx    = canvas.getContext('2d');

// ─── Bot images ────────────────────────────────────────────────────────────
// Body-only SVG (antenna squares removed)
const bodySvg = `<svg width="323" height="195" viewBox="0 0 323 195" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M293.06 67.26V84.26H274.25V50.61H256.16V34.33H236.26V49.89H219.98V33.97H198.63V15.89H180.9V0H142.55V15.89H123.74V33.62H104.2V49.18H86.47V33.62H65.85V49.18H48.48V84.27H28.94V66.18H0C0 65.09 0 100.19 0 100.19H28.22V132.39H47.4V164.23H65.85V179.43H85.03V194.79H123.38V180.52H197.91V194.79H237.71V181.24H256.16V165.32H273.89V131.67H293.43V101.28H322.37V67.27H293.06V67.26ZM123.5 131.33H94.56C94.56 131.33 95.16 98.05 94.56 97.39H123.5V131.33ZM228.07 131.33H199.13C199.13 131.33 199.73 98.05 199.13 97.39H228.07V131.33Z" fill="#FD4B08"/>
</svg>`;

function loadImg(svgStr) {
  const img = new Image();
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  img.src = URL.createObjectURL(blob);
  return img;
}
const bodyImg = loadImg(bodySvg);
let bodyLoaded = false;
bodyImg.onload = () => { bodyLoaded = true; };

// ─── Layout ────────────────────────────────────────────────────────────────
const SC = 0.86;
const BW = 323 * SC, BH = 195 * SC;
const BX = CX - BW/2, BY = CY - BH/2;

// Antenna squares in SVG space: x=65.5–86.5, x=235.58–256.58, y=5.76–26.96
const ANT_SVG = {
  L: { svgX: 65.5,   svgY: 5.76, svgW: 21, svgH: 21.2 },
  R: { svgX: 235.58, svgY: 5.76, svgW: 21, svgH: 21.2 },
};
function antCanvas(a) {
  return {
    x: BX + a.svgX * SC,
    y: BY + a.svgY * SC,
    w: a.svgW * SC,
    h: a.svgH * SC,
    cx: BX + (a.svgX + a.svgW/2) * SC,  // center x
    ty: BY + a.svgY * SC,                 // top y (before animation)
  };
}

// Eye rects in canvas space (for glow)
function eyeRect(svgCx, svgCy, svgW, svgH) {
  return { cx: BX + svgCx*SC, cy: BY + svgCy*SC, w: svgW*SC, h: svgH*SC };
}
const leftEye  = eyeRect(109.03, 114.36, 28.94, 33.94);
const rightEye = eyeRect(213.60, 114.36, 28.94, 33.94);

// ─── Deterministic noise ───────────────────────────────────────────────────
function det(n) {
  const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ─── Animation curves ──────────────────────────────────────────────────────
function getBobOffset(frame) {
  const t = frame / TOTAL_FRAMES;
  // 1.5 gentle bobs per loop
  return Math.sin(t * Math.PI * 2 * 1.5) * 6;
}

function getAntOffset(frame, side) {
  const t = frame / TOTAL_FRAMES;
  if (side === 'L') {
    // Left: sum of two sine waves → organic irregular bounce
    return (Math.sin(t * Math.PI * 2 * 2.1)       * 0.55
          + Math.sin(t * Math.PI * 2 * 3.4 + 0.8) * 0.45) * -18; // upward = negative
  } else {
    return (Math.sin(t * Math.PI * 2 * 1.8 + 1.1) * 0.60
          + Math.sin(t * Math.PI * 2 * 2.9 - 0.5) * 0.40) * -22;
  }
}

// Squash/stretch based on bob velocity
function getBobScale(frame) {
  const bob    = getBobOffset(frame);
  const bobPrev = getBobOffset(frame - 1);
  const vel    = bob - bobPrev; // positive = moving down
  return {
    scX: 1 + vel * 0.006,   // wider when moving down
    scY: 1 - vel * 0.005,   // shorter when moving down
  };
}

// ─── Flame drawing ─────────────────────────────────────────────────────────
function drawFlameShape(x, y, w, h, alpha, lean) {
  if (alpha <= 0 || h <= 1) return;
  const lx = (lean || 0) * h * 0.35; // lean at tip
  const grad = ctx.createLinearGradient(x, y, x + lx, y - h);
  grad.addColorStop(0,    `rgba(253,75,8,${alpha})`);
  grad.addColorStop(0.30, `rgba(255,120,0,${alpha * 0.9})`);
  grad.addColorStop(0.65, `rgba(255,185,20,${alpha * 0.6})`);
  grad.addColorStop(1,    `rgba(255,230,80,0)`);

  ctx.save();
  ctx.shadowColor = `rgba(255,130,0,${alpha * 0.55})`;
  ctx.shadowBlur  = w * 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - w,       y - h*0.18, x - w*0.45, y - h*0.88, x + lx, y - h);
  ctx.bezierCurveTo(x + lx + w*0.45, y - h*0.88, x + w,  y - h*0.18, x,      y);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

// Particle flame system — deterministic, seamless loop
const FLAME_COUNT = 22; // per side
const FLAME_LIFE  = 58; // frames

function drawFlames(frame, emitX, emitY, side, lean) {
  const si = side === 'L' ? 0 : 1;
  for (let i = 0; i < FLAME_COUNT; i++) {
    const seed  = si * 10000 + i;
    const birth = ((i * (TOTAL_FRAMES / FLAME_COUNT)) | 0);
    const age   = (frame - birth + TOTAL_FRAMES) % TOTAL_FRAMES;
    if (age >= FLAME_LIFE) continue;

    const p      = age / FLAME_LIFE;
    const easedP = Math.pow(p, 0.55);

    const driftX  = (det(seed)     - 0.5) * 22;
    const wobAmp  = det(seed+100)  * 9;
    const wobFreq = 1.8 + det(seed+200) * 3.2;
    const wobOff  = det(seed+300)  * Math.PI * 2;
    const rise    = 30 + det(seed+400) * 35;
    const baseW   = 7  + det(seed+500) * 9;
    const baseH   = 18 + det(seed+600) * 14;

    const wobX  = Math.sin(frame * 0.07 * wobFreq + wobOff) * wobAmp;
    const px    = emitX + driftX * easedP + wobX;
    const py    = emitY - rise * easedP;

    // Size: grow then shrink
    const sizeT = p < 0.28 ? p / 0.28 : 1 - (p - 0.28) / 0.72;
    const fw = baseW * sizeT;
    const fh = (baseH + easedP * 10) * sizeT;

    // Opacity: fade in/out
    const alpha = p < 0.15 ? p / 0.15 : Math.pow(1 - p, 0.65);

    drawFlameShape(px, py, fw, fh, alpha * 0.85, lean);
  }

  // Always-on base flames (2 layers, flickering)
  const t  = frame / TOTAL_FRAMES;
  const f1 = 0.72 + 0.28 * Math.sin(t * Math.PI * 2 * 4.1 + si * 1.2);
  const f2 = 0.65 + 0.35 * Math.sin(t * Math.PI * 2 * 5.7 + si * 2.4 + 1.3);
  drawFlameShape(emitX,        emitY, 11 * f1, 30 * f1, 0.75 * f1, lean);
  drawFlameShape(emitX + 3*si - 1, emitY, 7  * f2, 22 * f2, 0.60 * f2, lean * 0.7);
}

// ─── Warm eye glow ─────────────────────────────────────────────────────────
function drawEyes(frame, bobOffset) {
  const t     = frame / TOTAL_FRAMES;
  const pulse = 0.60 + 0.40 * Math.sin(t * Math.PI * 2 * 2.0);
  // Blink: very brief opacity dip every ~130 frames
  const blinkT    = ((frame % 130) / 130);
  const blinkDip  = blinkT > 0.94 ? 1 - Math.sin((blinkT - 0.94) / 0.06 * Math.PI) : 1;
  // Gaze drift: eyes "look" left/right slightly
  const gazeDrift = Math.sin(t * Math.PI * 2 * 0.7) * 4;

  [leftEye, rightEye].forEach(eye => {
    const ey = eye.cy + bobOffset;
    const ex = eye.cx + gazeDrift;
    const ea = pulse * blinkDip;

    // Warm amber inner fill
    ctx.save();
    ctx.globalAlpha = ea * 0.22;
    ctx.fillStyle   = '#FFB800';
    ctx.fillRect(ex - eye.w/2, ey - eye.h/2 * blinkDip, eye.w, eye.h * blinkDip);
    ctx.restore();

    // Soft outer bloom
    const bloom = ctx.createRadialGradient(ex, ey, 0, ex, ey, eye.w * 2.2);
    bloom.addColorStop(0, `rgba(255,185,0,${ea * 0.25})`);
    bloom.addColorStop(1, 'transparent');
    ctx.fillStyle = bloom;
    ctx.fillRect(ex - eye.w*2.2, ey - eye.w*2.2, eye.w*4.4, eye.w*4.4);
  });
}

// ─── Ground glow ───────────────────────────────────────────────────────────
function drawGround(frame, bobOffset) {
  const t = frame / TOTAL_FRAMES;
  const pulse = 0.80 + 0.20 * Math.sin(t * Math.PI * 2 * 1.5);
  const gy = BY + BH + bobOffset + 8;
  const g  = ctx.createRadialGradient(CX, gy, 0, CX, gy, 100);
  g.addColorStop(0,   `rgba(253,75,8,${0.13 * pulse})`);
  g.addColorStop(0.5, `rgba(200,50,0,${0.05 * pulse})`);
  g.addColorStop(1,    'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ─── Main render ───────────────────────────────────────────────────────────
function renderFrame(frame) {
  if (!bodyLoaded) return;

  const t       = frame / TOTAL_FRAMES;
  const phase   = t * Math.PI * 2;
  const bob     = getBobOffset(frame);
  const { scX, scY } = getBobScale(frame);

  // ── Background ──
  ctx.fillStyle = '#060402';
  ctx.fillRect(0, 0, W, H);

  // Warm ambient glow
  const ambR = 200 + 20 * Math.sin(phase * 1.5);
  const amb  = ctx.createRadialGradient(CX, CY, 0, CX, CY, ambR);
  amb.addColorStop(0,   'rgba(120,35,5,0.18)');
  amb.addColorStop(0.6, 'rgba(80,20,0,0.07)');
  amb.addColorStop(1,   'transparent');
  ctx.fillStyle = amb;
  ctx.fillRect(0, 0, W, H);

  // Ground glow
  drawGround(frame, bob);

  // ── Antenna positions (canvas) ──
  const La = antCanvas(ANT_SVG.L);
  const Ra = antCanvas(ANT_SVG.R);

  const leftAntOff  = getAntOffset(frame, 'L');
  const rightAntOff = getAntOffset(frame, 'R');

  // Lean: antenna velocity → flame lean direction
  const lAntVel = getAntOffset(frame, 'L') - getAntOffset(frame - 1, 'L');
  const rAntVel = getAntOffset(frame, 'R') - getAntOffset(frame - 1, 'R');

  // Flame emitter positions
  const lEmitX = La.cx;
  const lEmitY = La.ty + bob + leftAntOff;       // top of left antenna (with all offsets)
  const rEmitX = Ra.cx;
  const rEmitY = Ra.ty + bob + rightAntOff;

  // ── Flames (drawn below bot so they appear to come from behind top) ──
  drawFlames(frame, lEmitX, lEmitY, 'L', lAntVel * 0.12);
  drawFlames(frame, rEmitX, rEmitY, 'R', rAntVel * 0.12);

  // ── Bot body (squash/stretch + bob) ──
  ctx.save();
  ctx.translate(CX, CY + bob);
  ctx.scale(scX, scY);
  ctx.translate(-CX, -CY);

  ctx.shadowColor = `rgba(${OR},${OG},${OB},0.28)`;
  ctx.shadowBlur  = 16 + 6 * Math.sin(phase);
  ctx.drawImage(bodyImg, BX, BY, BW, BH);
  ctx.restore();

  // ── Antenna squares (drawn separately with their own bounce) ──
  ctx.save();
  ctx.shadowColor = `rgba(${OR},${OG},${OB},0.35)`;
  ctx.shadowBlur  = 10;
  ctx.fillStyle   = `rgb(${OR},${OG},${OB})`;

  // Left antenna
  ctx.fillRect(La.x, La.ty + bob + leftAntOff, La.w, La.h);
  // Right antenna
  ctx.fillRect(Ra.x, Ra.ty + bob + rightAntOff, Ra.w, Ra.h);
  ctx.restore();

  // ── Eye glow ──
  drawEyes(frame, bob);

  // ── Ember sparks (small bright dots rising up) ──
  const SPARKS = 16;
  for (let i = 0; i < SPARKS; i++) {
    const si   = i % 2; // 0=left, 1=right
    const seed = 50000 + i;
    const birth = ((i * (TOTAL_FRAMES / SPARKS)) | 0);
    const age   = (frame - birth + TOTAL_FRAMES) % TOTAL_FRAMES;
    const life  = 25 + det(seed) * 20;
    if (age >= life) continue;
    const p = age / life;

    const srcX = si === 0 ? lEmitX : rEmitX;
    const srcY = si === 0 ? lEmitY : rEmitY;

    const drift = (det(seed+200) - 0.5) * 40;
    const px    = srcX + drift * p + Math.sin(frame*0.1 + det(seed+300)*6) * 5;
    const py    = srcY - (20 + det(seed+400)*30) * p;
    const alpha = p < 0.2 ? p/0.2 : Math.pow(1-p, 0.8);
    const size  = (1.5 + det(seed+500)*2.5) * (1 - p*0.5);

    ctx.save();
    ctx.shadowColor = 'rgba(255,200,0,0.8)';
    ctx.shadowBlur  = 6;
    ctx.fillStyle   = `rgba(255,${150 + (det(seed+600)*80)|0},0,${alpha})`;
    ctx.fillRect(px - size/2, py - size/2, size, size);
    ctx.restore();
  }

  // ── Vignette ──
  const vig = ctx.createRadialGradient(CX, CY, W*0.25, CX, CY, W*0.75);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.52)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ─── Playback ──────────────────────────────────────────────────────────────
const scrubber     = document.getElementById('scrubber');
const frameCounter = document.getElementById('frame-counter');
const playBtn      = document.getElementById('play-btn');
const playIcon     = document.getElementById('play-icon');
const pauseIcon    = document.getElementById('pause-icon');
const restartBtn   = document.getElementById('restart-btn');

let currentFrame = 0, playing = true, scrubbing = false, lastTS = null;

function setPlaying(v) {
  playing = v; lastTS = null;
  playIcon.style.display  = v ? 'none'  : 'block';
  pauseIcon.style.display = v ? 'block' : 'none';
}
playBtn.addEventListener('click', () => setPlaying(!playing));
restartBtn.addEventListener('click', () => { currentFrame = 0; if (!playing) { renderFrame(0); updateUI(0); } });
scrubber.addEventListener('mousedown', () => { scrubbing = true; });
scrubber.addEventListener('input', () => { currentFrame = parseInt(scrubber.value); renderFrame(currentFrame); updateUI(currentFrame); });
scrubber.addEventListener('mouseup', () => { scrubbing = false; lastTS = null; });
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); setPlaying(!playing); } });
function updateUI(f) { scrubber.value = f; frameCounter.textContent = `f ${f} / ${TOTAL_FRAMES-1}`; }

function loop(ts) {
  if (!scrubbing && playing) {
    if (lastTS !== null) currentFrame = (currentFrame + (ts - lastTS) / 1000 * FPS) % TOTAL_FRAMES;
    lastTS = ts;
  }
  const f = Math.round(currentFrame) % TOTAL_FRAMES;
  renderFrame(f); updateUI(f);
  requestAnimationFrame(loop);
}

(function waitForBot() {
  if (!bodyLoaded) { setTimeout(waitForBot, 30); return; }
  setPlaying(true);
  requestAnimationFrame(loop);
})();

// ─── Export ────────────────────────────────────────────────────────────────
const exportBtn      = document.getElementById('export-btn');
const exportProgress = document.getElementById('export-progress');
const exportBar      = document.getElementById('export-progress-bar');

exportBtn.addEventListener('click', () => {
  if (exportBtn.disabled) return;
  setPlaying(false);
  exportBtn.disabled = true;
  exportBtn.classList.add('recording');
  exportBtn.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#FF0055"/></svg> REC...`;
  exportProgress.style.display = 'block';
  exportBar.style.width = '0%';

  const stream   = canvas.captureStream(60);
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks   = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mimeType });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'ante-bot-fire-spirit.webm';
    a.click();
    exportBtn.disabled = false;
    exportBtn.classList.remove('recording');
    exportBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 0v7M2.5 4.5l3 3 3-3M0 9.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> EXPORT`;
    exportProgress.style.display = 'none';
    exportBar.style.width = '0%';
    setPlaying(true);
  };
  recorder.start();
  let recFrame = 0;
  function renderNext() {
    if (recFrame >= TOTAL_FRAMES) { recorder.stop(); return; }
    renderFrame(recFrame); updateUI(recFrame);
    exportBar.style.width = `${(recFrame / TOTAL_FRAMES) * 100}%`;
    recFrame++;
    setTimeout(renderNext, 1000 / FPS);
  }
  renderNext();
});
</script>
</body>
</html>
